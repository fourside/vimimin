<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>vimimin Options</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1a1a1a;
        background: #fafafa;
      }
      h1 {
        font-size: 1.4rem;
        margin-bottom: 0.5rem;
      }
      p {
        color: #555;
        font-size: 0.9rem;
        margin-bottom: 1rem;
      }
      textarea {
        width: 100%;
        min-height: 320px;
        font-family: monospace;
        font-size: 0.9rem;
        padding: 0.75rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        resize: vertical;
        box-sizing: border-box;
        tab-size: 2;
      }
      .actions {
        margin-top: 0.75rem;
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      button {
        padding: 0.5rem 1.5rem;
        font-size: 0.9rem;
        border: none;
        border-radius: 4px;
        background: #0060df;
        color: #fff;
        cursor: pointer;
      }
      button:hover {
        background: #003eaa;
      }
      #status {
        font-size: 0.85rem;
      }
      .success {
        color: #058b00;
      }
      .error {
        color: #d70022;
      }
    </style>
  </head>
  <body>
    <h1>vimimin Options</h1>
    <p>
      Configure keybindings and siteinfo in JSON. Changes apply after page
      reload.
    </p>
    <textarea id="config" spellcheck="false"></textarea>
    <div class="actions">
      <button type="button" id="save">Save</button>
      <span id="status"></span>
    </div>
    <script src="options.js"></script>
  </body>
</html>
